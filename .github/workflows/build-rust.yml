name: Build Rust Backend

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"  # Disable incremental compilation for CI
  CARGO_NET_RETRY: "5"    # Retry failed downloads
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"  # Allow Python 3.14+

jobs:
  build:
    name: Build Rust Backend - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30  # Add timeout to prevent hanging
    strategy:
      fail-fast: false  # Continue other builds even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: librust_backend.so
            asset_prefix: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rust_backend.dll
            asset_prefix: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: librust_backend.dylib
            asset_prefix: macos

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
        components: clippy, rustfmt

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          optimization/backend/rust_backend/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('optimization/backend/rust_backend/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Build Rust library (Release)
      run: |
        cd optimization/backend/rust_backend
        cargo build --release --target ${{ matrix.target }} --verbose

    - name: Copy compiled library
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp "optimization/backend/rust_backend/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "optimization/backend/rust_backend.pyd"
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          cp "optimization/backend/rust_backend/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "optimization/backend/rust_backend_lib.so"
        else
          cp "optimization/backend/rust_backend/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "optimization/backend/rust_backend_lib.so"
        fi

    - name: Verify build
      shell: bash
      run: |
        echo "Checking build output..."
        ls -la optimization/backend/ || dir optimization/backend/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-backend-${{ matrix.asset_prefix }}
        path: |
          optimization/backend/rust_backend.pyd
          optimization/backend/rust_backend_lib.so
        if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release archives
      run: |
        cd artifacts
        for dir in */; do
          cd "$dir"
          zip -r ../${dir%/}.zip .
          cd ..
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
